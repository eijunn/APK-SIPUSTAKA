{% extends 'base.html' %}

{% block content %}

<div class="max-w-5xl">

    <!-- Header -->
    <div class="flex items-start gap-3 mb-8">

        <a href="{% url 'siswa_list' %}"
           class="text-gray-500 hover:text-gray-700 mt-1 text-4xl">
            ←
        </a>

        <div>
            <p class="text-gray-500 text-sm">
                Kelola User
            </p>

            <h1 class="text-4xl font-bold">
                Edit User
            </h1>
        </div>

    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-sm p-8">

        <form method="POST">

            {% csrf_token %}

            <div class="grid md:grid-cols-2 gap-6">

                <!-- Nama -->
                <div>
                    <label class="block text-sm font-medium mb-2">
                        Nama
                    </label>

                    <input
                        type="text"
                        name="nama"
                        value="{{ siswa.nama }}"
                        class="w-full border border-gray-200 rounded-3xl px-5 py-4 bg-gray-50"
                    >
                </div>

                <!-- Kelas -->
                <div>
                    <label class="block text-sm font-medium mb-2">
                        Kelas
                    </label>

                    <input
                        type="text"
                        name="kelas"
                        value="{{ siswa.kelas }}"
                        class="w-full border border-gray-200 rounded-3xl px-5 py-4 bg-gray-50"
                    >
                </div>

                <!-- NIS -->
                <div>
                    <label class="block text-sm font-medium mb-2">
                        NIS
                    </label>

                    <input
                        type="text"
                        name="nis"
                        value="{{ siswa.nis }}"
                        class="w-full border border-gray-200 rounded-3xl px-5 py-4 bg-gray-50"
                    >
                </div>

                <!-- Status -->
                <div>

                    <label class="block text-sm font-medium mb-2">
                        Status
                    </label>

                    <select
                        name="is_active"
                        class="w-full border border-gray-200 rounded-3xl px-5 py-4 bg-gray-50"
                    >

                        <option value="True"
                        {% if siswa.is_active %}
                        selected
                        {% endif %}
                        >
                            Aktif
                        </option>

                        <option value="False"
                        {% if not siswa.is_active %}
                        selected
                        {% endif %}
                        >
                            Tidak Aktif
                        </option>

                    </select>

                </div>

            </div>

            <!-- Footer -->
            <div class="border-t mt-8 pt-6">

                <div class="flex justify-end gap-3">

                    <a href="{% url 'siswa_list' %}"
                       class="px-6 py-3 rounded-2xl border border-gray-300 hover:bg-gray-100">

                        Batal

                    </a>

                    <button
                        type="submit"
                        class="px-6 py-3 rounded-2xl bg-blue-600 text-white hover:bg-blue-700"
                    >
                        Perbarui User
                    </button>

                </div>

            </div>

        </form>

    </div>

</div>

{% endblock %}
