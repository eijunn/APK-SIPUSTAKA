{% extends 'base.html' %}

{% block content %}

<div class="flex items-center gap-3 mb-8">

    <a href="/siswa/" class="text-slate-500 hover:text-slate-700 text-4xl mt-1">
        ←
    </a>

    <div>
        <p class="text-slate-500">
            Kelola User
        </p>

        <h1 class="text-3xl font-bold">
            Hapus User
        </h1>
    </div>

</div>

<div class="bg-white rounded-3xl shadow-sm p-6 max-w-3xl">

    <p class="text-slate-600 mb-2">
        Anda akan menghapus:
    </p>

    <h2 class="text-2xl font-bold mb-4">
        {{ siswa.nama }}
    </h2>

    <p class="text-slate-500 text-sm">
        Data user akan dihapus dari daftar anggota perpustakaan.
    </p>

    <hr class="my-6">

    <form method="POST" class="flex justify-end gap-3">

        {% csrf_token %}

        <a href="/siswa/" class="px-6 py-3 border rounded-2xl hover:bg-slate-50">
            Batal
        </a>

        <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-2xl">
            Hapus
        </button>

    </form>

</div>

{% endblock %}
