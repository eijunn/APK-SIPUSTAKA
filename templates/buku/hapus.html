{% extends 'base.html' %}

{% block content %}

<div class="flex items-center gap-3 mb-8">

    <a
        href="/peminjaman/"
        class="text-slate-500 hover:text-slate-700 text-4xl mt-1"
    >
        ←
    </a>

    <div>
        <p class="text-slate-500">
            kelola buku
        </p>

        <h1 class="text-3xl font-bold">
            hapus buku
        </h1>
    </div>

</div>
<div class="bg-white rounded-3xl shadow-sm p-6 max-w-3xl">

    <p class="text-slate-600 mb-2">
        Anda akan menghapus:
    </p>

    <h2 class="text-2xl font-bold mb-4">
        {{ buku.judul }}
    </h2>

    <p class="text-slate-500 text-sm">
        Data peminjaman yang menggunakan buku ini tidak akan otomatis dihapus.
    </p>
    {% if error %}
    <div class="bg-red-100 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-5">
        {{ error }}
    </div>
    {% endif %}

    <hr class="my-6">

    <form method="POST" class="flex justify-end gap-3">

        {% csrf_token %}

        <a href="/buku/" class="px-6 py-3 border rounded-2xl hover:bg-slate-50">
            Batal
        </a>

        <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-2xl">
            Hapus
        </button>

    </form>

</div>

{% endblock %}
